      // ── EXPORTAR CLIP INDIVIDUAL ──
      const exportVideoClip=async(cut)=>{
        const video=videoRef.current;if(!video||!videoSrc)return;
        video.pause();setIsPlaying(false);setSelectedCut(null);setIsPlayCompActive(false);
        setIsExporting(true);setExportProgress(0);setExportingName(cut.categoryName);
        const W=video.videoWidth||1920,H=video.videoHeight||1080;
        const ec=document.createElement('canvas');ec.width=W;ec.height=H;
        const eCtx=ec.getContext('2d',{willReadFrequently:false});
        eCtx.imageSmoothingEnabled=true;eCtx.imageSmoothingQuality='high';
        const stream=ec.captureStream(30);
        const mime=MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')?'video/webm;codecs=vp9,opus':'video/webm';
        recordedChunksRef.current=[];
        try{
          const mr=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:12_000_000});
          mediaRecorderRef.current=mr;
          mr.ondataavailable=e=>{if(e.data?.size>0)recordedChunksRef.current.push(e.data);};
          mr.onstop=()=>{
            const blob=new Blob(recordedChunksRef.current,{type:mime}),url=URL.createObjectURL(blob);
            const a=document.createElement('a');a.href=url;
            a.download=`clip_${cut.categoryName.toLowerCase().replace(/[^a-z0-9]/g,'_')}_${Math.floor(cut.start)}s.webm`;
            document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
            setIsExporting(false);showToast("✓ Clip exportado");
          };
          video.currentTime=cut.start;
          let rafId=null,startedAt=null;
          const onSeeked=()=>{
            video.removeEventListener('seeked',onSeeked);
            requestAnimationFrame(()=>requestAnimationFrame(()=>{
              mr.start();startedAt=performance.now();
              video.play().then(()=>setIsPlaying(true)).catch(()=>{});
              const total=cut.end-cut.start;
              const draw=()=>{
                if(video.currentTime>=cut.end||video.paused){if(rafId)cancelAnimationFrame(rafId);mr.stop();video.pause();setIsPlaying(false);return;}
                const animT=(performance.now()-(startedAt||0))/1000;
                eCtx.drawImage(video,0,0,W,H);
                renderShapesOnExportCanvas(eCtx,cut.shapes||[],W,H,W,H,video.currentTime,false,animT);
                setExportProgress(Math.min(100,Math.floor(((video.currentTime-cut.start)/total)*100)));
                rafId=requestAnimationFrame(draw);
              };
              rafId=requestAnimationFrame(draw);
            }));
          };
          video.addEventListener('seeked',onSeeked);
        }catch(err){console.error(err);showToast("Error al exportar","error");setIsExporting(false);}
      };

      // ── EXPORTAR UNIFICADO ──
      const exportUnifiedVideo=async()=>{
        const video=videoRef.current;if(!video||!videoSrc)return;
        const playlist=selectedCutsForMerge.map(id=>cuts.find(c=>c.id===id)||frames.find(f=>f.id===id)).filter(Boolean);
        if(!playlist.length){showToast("Seleccioná elementos para unificar","warning");return;}
        video.pause();setIsPlaying(false);setSelectedCut(null);setIsPlayCompActive(false);
        setIsExporting(true);setExportProgress(0);setExportingName('Preparando...');
        const W=video.videoWidth||1920,H=video.videoHeight||1080;
        const ec=document.createElement('canvas');ec.width=W;ec.height=H;
        const eCtx=ec.getContext('2d',{willReadFrequently:false});
        eCtx.imageSmoothingEnabled=true;eCtx.imageSmoothingQuality='high';
        const stream=ec.captureStream(30);
        const mime=MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')?'video/webm;codecs=vp9,opus':'video/webm';
        const chunks=[];
        const mr=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:12_000_000});
        mr.ondataavailable=e=>{if(e.data?.size>0)chunks.push(e.data);};
        mr.onstop=()=>{
          const blob=new Blob(chunks,{type:mime}),url=URL.createObjectURL(blob);
          const a=document.createElement('a');a.href=url;
          a.download=`IS_Analisis_${activeProject.name.toLowerCase().replace(/[^a-z0-9]/g,'_')}.webm`;
          document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
          setIsExporting(false);showToast("✓ Análisis exportado");
        };
        let idx=0,rafId=null,segmentStart=null;
        const next=()=>{
          if(idx>=playlist.length){if(rafId)cancelAnimationFrame(rafId);if(mr.state!=='inactive')mr.stop();return;}
          const item=playlist[idx];
          const isFrame=!item.categoryId;
          setExportingName(`(${idx+1}/${playlist.length}) ${isFrame?`📷 ${item.fileName||'Foto'}`:item.categoryName}`);
          if(isFrame){
            const img=new Image();
            img.onload=()=>{
              if(mr.state==='inactive')mr.start();else if(mr.state==='paused')mr.resume();
              let ticks=0;
              const draw=()=>{
                if(ticks>=150){if(mr.state==='recording')mr.pause();idx++;setExportProgress(Math.floor((idx/playlist.length)*100));setTimeout(next,150);return;}
                eCtx.fillStyle='#000000';eCtx.fillRect(0,0,W,H);
                // ✅ Foto sin distorsión — letterbox
                const ratio=Math.min(W/img.width,H/img.height);
                const dw=img.width*ratio,dh=img.height*ratio;
                const dx=(W-dw)/2,dy=(H-dh)/2;
                eCtx.imageSmoothingEnabled=true;eCtx.imageSmoothingQuality='high';
                eCtx.drawImage(img,dx,dy,dw,dh);
                const animT=ticks/30;
                renderShapesOnExportCanvas(eCtx,item.shapes||[],W,H,W,H,animT,true,animT);
                ticks++;rafId=requestAnimationFrame(draw);
              };
              rafId=requestAnimationFrame(draw);
            };
            img.src=item.dataUrl;
          }else{
            video.currentTime=item.start;
            const onSeeked=()=>{
              video.removeEventListener('seeked',onSeeked);
              requestAnimationFrame(()=>requestAnimationFrame(()=>{
                if(mr.state==='inactive')mr.start();else if(mr.state==='paused')mr.resume();
                segmentStart=performance.now();
                video.play().catch(()=>{});
                const draw=()=>{
                  if(video.currentTime>=item.end||video.paused){
                    video.pause();if(mr.state==='recording')mr.pause();
                    idx++;setExportProgress(Math.floor((idx/playlist.length)*100));
                    setTimeout(next,150);return;
                  }
                  const animT=(performance.now()-(segmentStart||0))/1000;
                  eCtx.drawImage(video,0,0,W,H);
                  renderShapesOnExportCanvas(eCtx,item.shapes||[],W,H,W,H,video.currentTime,false,animT);
                  rafId=requestAnimationFrame(draw);
                };
                rafId=requestAnimationFrame(draw);
              }));
            };
            video.addEventListener('seeked',onSeeked);
          }
        };
        next();
      };

      // ── CATEGORY HANDLERS ──
      const handleCategoryChange=(id,field,val)=>setCategories(prev=>prev.map(c=>c.id!==id?c:{...c,[field]:field==='lead'||field==='lag'?val===''?'':Math.max(0,parseFloat(val)||0):val}));

      const handleAddCategory=(e)=>{
        e.preventDefault();
        if(!newCatName.trim()){showToast("Ponéle un nombre","warning");return;}
        const sc=newCatShortcut.trim().toLowerCase().charAt(0);
        if(sc&&categories.some(c=>c.shortcut?.toLowerCase()===sc)){showToast(`Atajo '${sc.toUpperCase()}' ya en uso`,"warning");return;}
        setCategories(prev=>[...prev,{id:`cat-${Date.now()}`,name:newCatName.trim(),color:newCatColor,lead:parseFloat(newCatLead)||5,lag:parseFloat(newCatLag)||20,shortcut:sc||'sin'}]);
        setNewCatName('');setNewCatShortcut('');showToast("✓ Categoría creada");
      };

      const deleteCategory=(id)=>{
        if(categories.length<=1){showToast("Mínimo una categoría","warning");return;}
        setCategories(prev=>prev.filter(c=>c.id!==id));showToast("Categoría eliminada","info");
      };

      const exportProject=()=>{
        if(!cuts.length&&!frames.length){showToast("No hay datos para exportar","warning");return;}
        const d="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify({projectName:activeProject.name,videoName:activeProject.videoName,categories,cuts,frames,selectedCutsForMerge}));
        const a=document.createElement('a');a.href=d;a.download=`IS_Analisis_${activeProject.name.toLowerCase().replace(/[^a-z0-9]/g,'_')}.json`;document.body.appendChild(a);a.click();a.remove();
        showToast("✓ Proyecto exportado");
      };

      const handleImportProject=(e)=>{
        const f=e.target.files[0];if(!f)return;
        const r=new FileReader();
        r.onload=ev=>{
          try{
            const d=JSON.parse(ev.target.result),id=`proj-${Date.now()}`;
            setProjects(prev=>[...prev,{id,name:d.projectName||f.name.replace('.json',''),videoName:d.videoName||'',cuts:d.cuts||[],frames:d.frames||[],categories:d.categories||DEFAULT_CATEGORIES,selectedCutsForMerge:d.selectedCutsForMerge||(d.cuts?d.cuts.map(c=>c.id):[])}]);
            setActiveProjectId(id);setActiveTab('list');showToast("✓ Proyecto importado");
          }catch{showToast("Archivo JSON inválido","error");}
        };
        r.readAsText(f);
      };

      const handleToggleCutCheckbox=(id)=>setSelectedCutsForMerge(prev=>prev.includes(id)?prev.filter(i=>i!==id):[...prev,id]);
      const handleSelectAllCuts=()=>setSelectedCutsForMerge([...cuts.map(c=>c.id),...frames.map(f=>f.id)]);
      const handleDeselectAllCuts=()=>setSelectedCutsForMerge([]);
      const moveCutInMergeOrder=(index,dir)=>{
        const o=[...selectedCutsForMerge];
        if(dir==='up'&&index>0)[o[index],o[index-1]]=[o[index-1],o[index]];
        if(dir==='down'&&index<o.length-1)[o[index],o[index+1]]=[o[index+1],o[index]];
        setSelectedCutsForMerge(o);
      };

      const handleCreateProject=(e)=>{
        e.preventDefault();if(!newProjName.trim()){showToast("Escribí el nombre del partido","warning");return;}
        const id=`proj-${Date.now()}`;
        setProjects(prev=>[...prev,{id,name:newProjName.trim(),videoName:'',cuts:[],frames:[],categories:DEFAULT_CATEGORIES,selectedCutsForMerge:[]}]);
        setActiveProjectId(id);setNewProjName('');setActiveTab('panel');showToast("✓ Proyecto creado");
      };

      const switchProject=(id)=>{
        setActiveProjectId(id);setSelectedCut(null);setIsPlayCompActive(false);setIsPlaying(false);
        setShapes([]);setSelectedShapeId(null);setEditingContext({type:'global',id:null});setFocusShape(null);setFocusTool(null);
        showToast(`✓ ${projects.find(p=>p.id===id)?.name}`,"info");
      };

      const deleteProject=(id,name)=>{
        if(projects.length<=1){showToast("Mínimo un proyecto","warning");return;}
        setConfirmModal({
          isOpen:true,title:"Eliminar Proyecto",message:`¿Borrar permanentemente "${name}"?`,
          onConfirm:()=>{
            setProjects(prev=>{const f=prev.filter(p=>p.id!==id);if(activeProjectId===id)setActiveProjectId(f[0].id);return f;});
            setLoadedVideos(prev=>{const c={...prev};delete c[id];return c;});
            setIsPlayCompActive(false);setShapes([]);setEditingContext({type:'global',id:null});
            showToast("Proyecto eliminado","info");setConfirmModal(p=>({...p,isOpen:false}));
          }
        });
      };

      const selectedShape=shapes.find(s=>s.id===selectedShapeId);
      const isShapeSelected=!!selectedShape;
      const getEditingContextName=()=>{
        if(editingContext.type==='cut'){const c=cuts.find(i=>i.id===editingContext.id);return c?`"${c.categoryName}"`:''}
        if(editingContext.type==='frame'){const f=frames.find(i=>i.id===editingContext.id);return f?`Foto @ ${formatTime(f.time)}`:''}
        return '';
      };

      return (
        <div className="min-h-screen flex flex-col" style={{background:'#080810',color:'#f1f5f9',fontFamily:'Inter,sans-serif'}}>

          {/* ── CONTEXT MENUS ── */}
          {contextMenu&&(
            <ContextMenu
              x={contextMenu.x} y={contextMenu.y}
              hasAnimation={contextMenu.hasAnimation}
              onDelete={()=>{setShapes(prev=>prev.filter(s=>s.id!==contextMenu.shapeId));setSelectedShapeId(null);showToast("Figura eliminada","info");}}
              onAnimate={()=>{
                const anims=['pulse','fadein','spin','vibrate'];
                setShapes(prev=>prev.map(s=>{
                  if(s.id!==contextMenu.shapeId)return s;
                  if(s.animation)return{...s,animation:null};
                  return{...s,animation:anims[0]};
                }));
              }}
              onClose={()=>setContextMenu(null)}
            />
          )}
          {tbContextMenu&&(
            <div className="context-menu" style={{left:tbContextMenu.x,top:tbContextMenu.y}}>
              <div className="context-menu-item danger" onClick={()=>{setTbShapes(prev=>prev.filter(s=>s.id!==tbContextMenu.shapeId));setTbContextMenu(null);showToast("Figura eliminada","info");}}>
                <Icons.Trash className="w-3.5 h-3.5"/>Eliminar figura
              </div>
            </div>
          )}

          {/* ── TOAST ── */}
          {notification&&(
            <div className={`fixed top-5 right-5 z-50 px-5 py-3.5 rounded-xl shadow-2xl flex items-center gap-3 animate-slide-in
              ${notification.type==='success'?'bg-emerald-950 border border-emerald-500/40 text-emerald-200':
                notification.type==='warning'?'bg-amber-950 border border-amber-500/40 text-amber-200':
                notification.type==='info'?'bg-blue-950 border border-blue-500/40 text-blue-200':
                'bg-red-950 border border-red-500/40 text-red-200'}`}>
              <span className="w-2 h-2 rounded-full bg-current animate-ping flex-shrink-0"/>
              <span className="text-sm font-medium">{notification.message}</span>
            </div>
          )}

          {/* ── CONFIRM MODAL ── */}
          {confirmModal.isOpen&&(
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:'rgba(0,0,0,0.8)',backdropFilter:'blur(8px)'}}>
              <div className="glass rounded-2xl p-6 max-w-sm w-full shadow-2xl animate-fade-up">
                <h3 className="font-bold text-white mb-2 flex items-center gap-2">
                  <span className="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse"/>
                  {confirmModal.title}
                </h3>
                <p className="text-sm text-slate-400 mb-6 leading-relaxed">{confirmModal.message}</p>
                <div className="flex justify-end gap-3">
                  <button onClick={()=>setConfirmModal(p=>({...p,isOpen:false}))} className="px-4 py-2 rounded-lg text-xs font-semibold text-slate-300 hover:bg-white/5 transition">Cancelar</button>
                  <button onClick={confirmModal.onConfirm} className="px-4 py-2 rounded-lg text-xs font-bold bg-red-600 hover:bg-red-500 text-white transition">Confirmar</button>
                </div>
              </div>
            </div>
          )}

          {/* ── EXPORT OVERLAY ── */}
          {isExporting&&(
            <div className="fixed inset-0 z-50 flex items-center justify-center p-6" style={{background:'rgba(0,0,0,0.85)',backdropFilter:'blur(12px)'}}>
              <div className="glass rounded-2xl p-8 max-w-md w-full text-center shadow-2xl">
                <div className="w-16 h-16 mx-auto mb-5 rounded-full flex items-center justify-center border-2 border-dashed border-fuchsia-500 animate-spin" style={{color:'#d946ef'}}>
                  <Icons.VideoFile className="w-7 h-7"/>
                </div>
                <h3 className="text-lg font-bold text-white mb-1">Exportando Video</h3>
                <p className="text-sm text-slate-400 mb-6"><span className="text-fuchsia-400 font-semibold">{exportingName}</span></p>
                <div className="w-full rounded-full h-2 mb-2 overflow-hidden" style={{background:'rgba(255,255,255,0.08)'}}>
                  <div className="h-full rounded-full transition-all duration-100" style={{width:`${exportProgress}%`,background:'linear-gradient(90deg,#d946ef,#a855f7)'}}/>
                </div>
                <div className="text-sm font-mono font-bold text-fuchsia-300">{exportProgress}%</div>
                <p className="text-xs text-slate-500 mt-3">Mantené la pestaña activa</p>
              </div>
            </div>
          )}

          {/* ══════════════════════════════════════
              HEADER
          ══════════════════════════════════════ */}
          <header className="flex-shrink-0 glass border-b border-white/5 px-6 py-3.5 flex items-center justify-between gap-4">
            <div className="flex items-center gap-3">
              <div className="w-9 h-9 rounded-xl flex items-center justify-center font-black text-white text-sm shadow-lg animate-glow"
                style={{background:'linear-gradient(135deg,#d946ef,#7c3aed)'}}>IS</div>
              <div>
                <h1 className="text-lg font-extrabold tracking-tight leading-none">
                  <span style={{background:'linear-gradient(90deg,#d946ef,#a855f7)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>
                    IS Análisis
                  </span>
                </h1>
                <p className="text-[10px] text-slate-500 font-medium tracking-wide">Plataforma Táctica Profesional</p>
              </div>
              <div className="ml-2 px-2.5 py-1 rounded-full text-[11px] font-semibold text-fuchsia-300 border border-fuchsia-500/20 max-w-[180px] truncate"
                style={{background:'rgba(217,70,239,0.08)'}}>
                📁 {activeProject.name}
              </div>
            </div>
            <div className="flex items-center gap-2 flex-wrap">
              <input type="file" accept="video/*" ref={fileInputRef} className="hidden" onChange={handleVideoUpload}/>
              <button onClick={()=>fileInputRef.current?.click()} className="btn-premium flex items-center gap-2 px-4 py-2 rounded-lg text-xs font-bold text-white shadow-lg">
                <Icons.Upload className="w-4 h-4"/><span>Vincular Video</span>
              </button>
              <button onClick={openTacticBoard}
                className="flex items-center gap-2 px-4 py-2 rounded-lg text-xs font-bold transition"
                style={showTacticBoard?{background:'linear-gradient(135deg,#059669,#10b981)',boxShadow:'0 4px 16px rgba(16,185,129,0.3)',color:'white'}:{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.08)',color:'#cbd5e1'}}>
                <Icons.TacticBoard className="w-4 h-4"/><span>Pizarra Táctica</span>
              </button>
              <input type="file" accept=".json" ref={importInputRef} className="hidden" onChange={handleImportProject}/>
              <button onClick={()=>importInputRef.current?.click()}
                className="flex items-center gap-2 px-4 py-2 rounded-lg text-xs font-semibold text-slate-300 hover:text-white transition"
                style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.08)'}}>
                <Icons.Upload className="w-4 h-4"/><span>Importar</span>
              </button>
              <button onClick={exportProject}
                className="flex items-center gap-2 px-4 py-2 rounded-lg text-xs font-semibold text-slate-300 hover:text-white transition"
                style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.08)'}}>
                <Icons.Download className="w-4 h-4"/><span>Exportar</span>
              </button>
            </div>
          </header>

          {/* ══════════════════════════════════════
              MAIN
          ══════════════════════════════════════ */}
          <main className="flex-1 flex flex-col lg:flex-row overflow-hidden">

            {/* ── LEFT: PLAYER ── */}
            <div className="flex-1 flex flex-col relative border-r border-white/5 fullscreen-container"
              ref={videoContainerRef}
              onMouseMove={handleMouseMoveInPlayer}
              style={{background:'#080810'}}>

              {/* Editing context banner */}
              {editingContext.type!=='global'&&(
                <div className="flex-shrink-0 fs-hide flex items-center justify-between px-4 py-2.5 border-b border-amber-500/20 animate-fade-up"
                  style={{background:'rgba(245,158,11,0.08)'}}>
                  <div className="flex items-center gap-2">
                    <span className="w-1.5 h-1.5 rounded-full bg-amber-400 animate-ping"/>
                    <span className="text-xs font-semibold text-amber-300">Editando pizarra de: {getEditingContextName()}</span>
                  </div>
                  <button onClick={saveContextAndClose}
                    className="flex items-center gap-1.5 px-3 py-1 rounded-lg text-[11px] font-bold text-amber-300 hover:text-white transition"
                    style={{background:'rgba(245,158,11,0.12)',border:'1px solid rgba(245,158,11,0.25)'}}>
                    <Icons.Check className="w-3.5 h-3.5"/>Guardar y Cerrar
                  </button>
                </div>
              )}

              {/* Foco banner */}
              {focusTool&&(
                <div className="flex-shrink-0 fs-hide flex items-center justify-between px-4 py-2 border-b border-fuchsia-500/20"
                  style={{background:'rgba(217,70,239,0.04)'}}>
                  <div className="flex items-center gap-2">
                    <span className="w-1.5 h-1.5 rounded-full bg-fuchsia-400 animate-pulse"/>
                    <span className="text-xs font-medium text-fuchsia-300">
                      🔍 <strong>Foco:</strong> {focusTool==='spotlight'?'Spotlight':focusTool==='zoom'?`Zoom ${zoomLevel}×`:focusTool==='tracker'?'Marcador':'Cuadro'} — Clic para posicionar
                    </span>
                  </div>
                  <button onClick={()=>{setFocusTool(null);setFocusShape(null);}}
                    className="text-[11px] font-bold text-fuchsia-300 hover:text-white px-3 py-1 rounded-lg transition"
                    style={{background:'rgba(217,70,239,0.12)'}}>Desactivar</button>
                </div>
              )}

              {/* Video area */}
              <div className="flex-1 flex items-center justify-center overflow-hidden relative p-4 group">
                {videoSrc?(
                  <div className="relative w-full h-full flex items-center justify-center">
                    <div className="relative shadow-2xl rounded-xl overflow-hidden"
                      style={{aspectRatio:`${videoDimensions.width}/${videoDimensions.height}`,maxWidth:'100%',maxHeight:'100%',boxShadow:'0 0 80px rgba(217,70,239,0.06)'}}>
                      <video ref={videoRef} src={videoSrc} className="w-full h-full object-cover"
                        onClick={focusTool?undefined:togglePlay}
                        onTimeUpdate={handleTimeUpdate} onLoadedMetadata={handleLoadedMetadata}
                        onSeeked={()=>{isTransitioningRef.current=false;}}/>
                      {activeCompFrame&&(
                        <img src={activeCompFrame.dataUrl} className="absolute inset-0 w-full h-full z-20"
                          alt="frame" style={{objectFit:'contain',background:'#000'}}/>
                      )}
                      <svg ref={svgRef}
                        viewBox={`0 0 ${videoDimensions.width} ${videoDimensions.height}`}
                        onPointerDown={handlePointerDown} onPointerMove={handlePointerMove}
                        onPointerUp={handlePointerUp} onPointerLeave={handlePointerUp}
                        style={{pointerEvents:(isPlaying||isPlayCompActive)?'none':'auto'}}
                        className={`absolute inset-0 w-full h-full z-30 touch-none ${drawTool==='text'?'cursor-text':focusTool?'cursor-crosshair':''}`}>
                        {shapes.map(s=>renderShape(s,false))}
                        {currentShape&&renderShape(currentShape,true)}
                        {renderFocusOverlay()}
                      </svg>

                      {/* ── FULLSCREEN CONTROLS OVERLAY ── */}
                      <div className={`fs-controls absolute bottom-0 left-0 right-0 z-40 transition-opacity duration-300 ${showControls?'show':''}`}>
                        <div className="px-4 pb-4 pt-10" style={{background:'linear-gradient(transparent,rgba(0,0,0,0.88))'}}>
                          <div data-timeline className="h-1.5 rounded-full cursor-pointer mb-3 relative"
                            style={{background:'rgba(255,255,255,0.15)'}}
                            onClick={handleProgressClick}>
                            {duration>0&&cuts.map(c=>(
                              <div key={c.id} className="absolute top-0 h-full rounded-full opacity-70"
                                style={{left:`${(c.start/duration)*100}%`,width:`${((c.end-c.start)/duration)*100}%`,backgroundColor:c.color}}/>
                            ))}
                            <div className="h-full rounded-full relative pointer-events-none"
                              style={{width:`${duration?(currentTime/duration)*100:0}%`,background:'linear-gradient(90deg,#d946ef,#a855f7)'}}>
                              <div className="absolute right-0 top-1/2 -translate-y-1/2 w-3.5 h-3.5 rounded-full bg-white shadow-lg"/>
                            </div>
                          </div>
                          <div className="flex items-center justify-between">

                            return(
                              <div key={p.id} className="rounded-xl p-4 transition"
                                style={{background:isAct?'rgba(217,70,239,0.05)':'rgba(255,255,255,0.02)',border:isAct?'1px solid rgba(217,70,239,0.18)':'1px solid rgba(255,255,255,0.05)'}}>
                                <div className="flex justify-between items-start mb-3">
                                  <div>
                                    <div className="flex items-center gap-2">
                                      <h4 className="font-bold text-sm text-white">{p.name}</h4>
                                      {isAct&&<span className="text-[9px] font-bold px-2 py-0.5 rounded-full text-fuchsia-300" style={{background:'rgba(217,70,239,0.12)'}}>ACTIVO</span>}
                                    </div>
                                    <p className="text-[10px] text-slate-600 mt-0.5 font-mono">{p.videoName||'Sin video'}</p>
                                  </div>
                                  <button onClick={()=>deleteProject(p.id,p.name)} className="p-1.5 text-slate-600 hover:text-red-400 transition rounded-lg hover:bg-red-400/8">
                                    <Icons.Trash className="w-3.5 h-3.5"/>
                                  </button>
                                </div>
                                <div className="flex items-center justify-between pt-2 border-t border-white/5">
                                  <span className="text-[10px] text-slate-600 font-mono">{p.cuts.length} cortes · {(p.frames||[]).length} fotos</span>
                                  {!isAct&&(
                                    <button onClick={()=>switchProject(p.id)}
                                      className="text-[11px] font-bold text-fuchsia-400 hover:text-fuchsia-300 px-3 py-1 rounded-lg transition"
                                      style={{background:'rgba(217,70,239,0.06)',border:'1px solid rgba(217,70,239,0.12)'}}>
                                      Cargar
                                    </button>
                                  )}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}

                    {/* ══ TAB: BOTONERA ══ */}
                    {activeTab==='panel'&&(
                      <div className="space-y-3 animate-fade-up">
                        <div className="rounded-xl p-3 text-xs text-slate-500 leading-relaxed"
                          style={{background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.05)'}}>
                          🎬 Analizando: <strong className="text-fuchsia-400">{activeProject.name}</strong>
                          <span className="block mt-0.5 text-[10px] text-slate-600">Clic en el botón o usá el atajo al momento del evento</span>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                          {categories.map(cat=>{
                            const textColor=getContrastColor(cat.color);
                            return(
                              <button key={cat.id} onClick={()=>triggerCut(cat)}
                                className="p-4 rounded-xl flex flex-col items-start justify-between text-left transition active:scale-95 h-[88px] relative overflow-hidden"
                                style={{backgroundColor:cat.color,boxShadow:`0 4px 20px ${cat.color}33`}}>
                                <div className="absolute inset-0 opacity-0 hover:opacity-100 transition-opacity"
                                  style={{background:'linear-gradient(135deg,rgba(255,255,255,0.12),transparent)'}}/>
                                <span className="font-bold text-sm leading-tight relative z-10" style={{color:textColor}}>{cat.name}</span>
                                <div className="flex justify-between w-full mt-auto relative z-10">
                                  <span className="text-[10px] font-mono opacity-75" style={{color:textColor}}>−{cat.lead}s / +{cat.lag}s</span>
                                  <span className="text-[10px] font-bold px-1.5 py-0.5 rounded uppercase"
                                    style={{background:'rgba(0,0,0,0.2)',color:textColor}}>{cat.shortcut}</span>
                                </div>
                              </button>
                            );
                          })}
                        </div>
                      </div>
                    )}

                    {/* ══ TAB: UNIFICAR ══ */}
                    {activeTab==='list'&&(
                      <div className="space-y-4 animate-fade-up">
                        <div className="flex justify-between items-center">
                          <span className="text-[10px] font-bold text-slate-600 uppercase tracking-widest">Compilado y exportación</span>
                          <span className="text-[10px] font-bold text-fuchsia-400 px-2 py-0.5 rounded-full font-mono"
                            style={{background:'rgba(217,70,239,0.08)'}}>
                            {selectedCutsForMerge.length} sel.
                          </span>
                        </div>

                        <div className="rounded-2xl p-4 space-y-3"
                          style={{background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.05)'}}>
                          <div className="flex justify-between items-center pb-2 border-b border-white/5">
                            <span className="text-xs font-bold text-white">Orden del compilado</span>
                            <div className="flex gap-3 text-[10px]">
                              <button onClick={handleSelectAllCuts} className="text-fuchsia-400 hover:text-fuchsia-300 font-bold transition">Todo</button>
                              <span className="text-slate-700">|</span>
                              <button onClick={handleDeselectAllCuts} className="text-slate-500 hover:text-slate-400 font-bold transition">Ninguno</button>
                            </div>
                          </div>

                          {selectedCutsForMerge.length>0&&(
                            <div className="space-y-1 max-h-44 overflow-y-auto pr-1">
                              {selectedCutsForMerge.map((id,index)=>{
                                const cc=cuts.find(c=>c.id===id),cf=frames.find(f=>f.id===id);
                                if(!cc&&!cf)return null;
                                const isF=!!cf;
                                const title=cc?cc.categoryName:(cf.isImported?`📷 ${cf.fileName||'Foto importada'}`:`📸 Foto @ ${formatTime(cf.time)}`);
                                const col=cc?cc.color:'#d946ef';
                                return(
                                  <div key={id} className="flex items-center justify-between px-3 py-2 rounded-lg"
                                    style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.05)'}}>
                                    <div className="flex items-center gap-2 truncate pr-2">
                                      <span className="text-[9px] font-mono text-slate-600 flex-shrink-0">{index+1}</span>
                                      <span className="w-2 h-2 rounded-full flex-shrink-0" style={{backgroundColor:col}}/>
                                      <span className="text-xs text-slate-300 truncate font-medium">
                                        {isF&&<span className="text-[9px] text-amber-400 font-bold mr-1 uppercase">foto</span>}
                                        {title}
                                      </span>
                                    </div>
                                    <div className="flex gap-1 flex-shrink-0">
                                      <button onClick={()=>moveCutInMergeOrder(index,'up')} disabled={index===0}
                                        className="p-1 text-slate-500 hover:text-white disabled:opacity-20 rounded transition hover:bg-white/5">
                                        <Icons.ArrowUp className="w-3 h-3"/>
                                      </button>
                                      <button onClick={()=>moveCutInMergeOrder(index,'down')} disabled={index===selectedCutsForMerge.length-1}
                                        className="p-1 text-slate-500 hover:text-white disabled:opacity-20 rounded transition hover:bg-white/5">
                                        <Icons.ArrowDown className="w-3 h-3"/>
                                      </button>
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          )}

                          <div className="grid grid-cols-2 gap-2 pt-1">
                            <button onClick={playCompilationInApp} disabled={!selectedCutsForMerge.length||!videoSrc}
                              className="flex items-center justify-center gap-2 py-2.5 rounded-xl text-xs font-bold text-white transition disabled:opacity-30"
                              style={{background:'linear-gradient(135deg,#3b82f6,#6366f1)',boxShadow:selectedCutsForMerge.length&&videoSrc?'0 4px 16px rgba(99,102,241,0.25)':'none'}}>
                              <Icons.Tv className="w-4 h-4"/><span>Ver en App</span>
                            </button>
                            <button onClick={exportUnifiedVideo} disabled={!selectedCutsForMerge.length||!videoSrc}
                              className="flex items-center justify-center gap-2 py-2.5 rounded-xl text-xs font-bold text-white transition disabled:opacity-30"
                              style={{background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.1)'}}>
                              <Icons.Layers className="w-4 h-4"/><span>Exportar Unificado</span>
                            </button>
                          </div>
                        </div>

                        {!cuts.length?(
                          <div className="text-center py-12 rounded-2xl"
                            style={{background:'rgba(255,255,255,0.01)',border:'1px solid rgba(255,255,255,0.04)'}}>
                            <Icons.List className="w-8 h-8 mx-auto mb-3 text-slate-700"/>
                            <h3 className="font-bold text-sm text-slate-600 mb-1">Sin cortes todavía</h3>
                            <p className="text-xs text-slate-700">Usá la Botonera para marcar eventos del partido</p>
                          </div>
                        ):(
                          <div className="space-y-2">
                            {cuts.map((cut,idx)=>{
                              const isChk=selectedCutsForMerge.includes(cut.id);
                              const isEdit=editingContext.type==='cut'&&editingContext.id===cut.id;
                              return(
                                <div key={cut.id} className="rounded-xl overflow-hidden transition"
                                  style={{border:isEdit?'1px solid rgba(245,158,11,0.25)':'1px solid rgba(255,255,255,0.05)',background:isEdit?'rgba(245,158,11,0.03)':'rgba(255,255,255,0.02)'}}>
                                  <div className="flex">
                                    <div className="w-1 flex-shrink-0" style={{backgroundColor:cut.color}}/>
                                    <div className="flex-1 p-3">
                                      <div className="flex items-center justify-between mb-2">
                                        <div className="flex items-center gap-2">
                                          <input type="checkbox" checked={isChk} onChange={()=>handleToggleCutCheckbox(cut.id)}
                                            className="w-3.5 h-3.5 rounded cursor-pointer accent-fuchsia-500"/>
                                          <span className="text-[9px] text-slate-600 font-mono">#{idx+1}</span>
                                          <span className="font-semibold text-xs text-white truncate max-w-[110px]">{cut.categoryName}</span>
                                          {cut.shapes?.length>0&&(
                                            <span className="text-[9px] font-bold text-fuchsia-400 px-1.5 py-0.5 rounded"
                                              style={{background:'rgba(217,70,239,0.08)'}}>
                                              🎨 {cut.shapes.length}
                                            </span>
                                          )}
                                        </div>
                                        <div className="flex items-center gap-1">
                                          <button onClick={()=>startEditCutContext(cut)}
                                            className={`p-1.5 rounded-lg transition ${isEdit?'text-amber-300':'text-slate-500 hover:text-amber-400 hover:bg-white/5'}`}>
                                            <Icons.Edit className="w-3.5 h-3.5"/>
                                          </button>
                                          <button onClick={()=>playCut(cut)}
                                            className="p-1.5 rounded-lg text-slate-500 hover:text-blue-400 hover:bg-white/5 transition">
                                            <Icons.Play className="w-3.5 h-3.5"/>
                                          </button>
                                          <button onClick={()=>exportVideoClip(cut)}
                                            className="p-1.5 rounded-lg text-slate-500 hover:text-emerald-400 hover:bg-white/5 transition">
                                            <Icons.Download className="w-3.5 h-3.5"/>
                                          </button>
                                          <button onClick={()=>deleteCut(cut.id)}
                                            className="p-1.5 rounded-lg text-slate-500 hover:text-red-400 hover:bg-white/5 transition">
                                            <Icons.Trash className="w-3.5 h-3.5"/>
                                          </button>
                                        </div>
                                      </div>
                                      {/* ✅ Edición tiempo inicio/fin */}
                                      <div className="flex items-center gap-2 rounded-lg px-2.5 py-1.5"
                                        style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.05)'}}>
                                        <span className="text-[9px] text-slate-600 font-bold uppercase">In</span>
                                        <input type="text" value={formatTime(cut.start)}
                                          onChange={e=>{const v=parseTimeInput(e.target.value);if(!isNaN(v))setCuts(prev=>prev.map(c=>c.id===cut.id?{...c,start:+Math.min(v,c.end-0.5).toFixed(2)}:c));}}
                                          className="w-16 text-center rounded-lg text-xs font-mono font-bold text-fuchsia-300 focus:outline-none py-0.5 transition"
                                          style={{background:'rgba(217,70,239,0.06)',border:'1px solid rgba(217,70,239,0.12)'}}
                                          onFocus={e=>e.target.style.borderColor='rgba(217,70,239,0.5)'}
                                          onBlur={e=>e.target.style.borderColor='rgba(217,70,239,0.12)'}/>
                                        <span className="text-slate-700 text-xs">→</span>
                                        <span className="text-[9px] text-slate-600 font-bold uppercase">Out</span>
                                        <input type="text" value={formatTime(cut.end)}
                                          onChange={e=>{const v=parseTimeInput(e.target.value);if(!isNaN(v))setCuts(prev=>prev.map(c=>c.id===cut.id?{...c,end:+Math.max(v,c.start+0.5).toFixed(2)}:c));}}
                                          className="w-16 text-center rounded-lg text-xs font-mono font-bold text-fuchsia-300 focus:outline-none py-0.5 transition"
                                          style={{background:'rgba(217,70,239,0.06)',border:'1px solid rgba(217,70,239,0.12)'}}
                                          onFocus={e=>e.target.style.borderColor='rgba(217,70,239,0.5)'}
                                          onBlur={e=>e.target.style.borderColor='rgba(217,70,239,0.12)'}/>
                                        <span className="text-[9px] text-slate-600 font-mono ml-auto">{(cut.end-cut.start).toFixed(1)}s</span>
                                      </div>
                                    </div>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    )}

                    {/* ══ TAB: FOTOS ══ */}
                    {activeTab==='frames'&&(
                      <div className="space-y-4 animate-fade-up">
                        <div className="flex items-center justify-between">
                          <span className="text-[10px] font-bold text-slate-600 uppercase tracking-widest">Galería de capturas</span>
                          <div className="flex items-center gap-2">
                            <span className="text-[10px] font-bold text-fuchsia-400 px-2 py-0.5 rounded-full font-mono"
                              style={{background:'rgba(217,70,239,0.08)'}}>
                              {frames.length} fotos
                            </span>
                            <input type="file" accept="image/*" ref={importPhotoRef} className="hidden" onChange={handleImportPhoto}/>
                            <button onClick={()=>importPhotoRef.current?.click()}
                              className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-bold text-slate-300 hover:text-white transition"
                              style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.08)'}}>
                              <Icons.ImgImport className="w-3.5 h-3.5"/>Importar Foto
                            </button>
                          </div>
                        </div>

                        {!frames.length?(
                          <div className="text-center py-12 rounded-2xl"
                            style={{background:'rgba(255,255,255,0.01)',border:'1px solid rgba(255,255,255,0.04)'}}>
                            <Icons.Image className="w-8 h-8 mx-auto mb-3 text-slate-700"/>
                            <h3 className="font-bold text-sm text-slate-600 mb-1">Sin fotos todavía</h3>
                            <p className="text-xs text-slate-700">Capturá fotogramas o importá imágenes desde tu computadora</p>
                          </div>
                        ):(
                          <div className="grid grid-cols-2 gap-3">
                            {frames.map((frame,idx)=>{
                              const isEdit=editingContext.type==='frame'&&editingContext.id===frame.id;
                              const isChk=selectedCutsForMerge.includes(frame.id);
                              return(
                                <div key={frame.id} className="rounded-xl overflow-hidden flex flex-col group transition"
                                  style={{border:isEdit?'1px solid rgba(245,158,11,0.35)':'1px solid rgba(255,255,255,0.06)',background:'rgba(255,255,255,0.02)',boxShadow:isEdit?'0 0 20px rgba(245,158,11,0.08)':'none'}}>
                                  <div className="relative aspect-video" style={{background:'#000'}}>
                                    <img src={frame.dataUrl} alt={`Captura ${idx+1}`}
                                      className="w-full h-full transition-opacity group-hover:opacity-95"
                                      style={{objectFit:'contain'}}/>
                                    {frame.isImported&&(
                                      <div className="absolute top-1.5 right-1.5 text-[8px] font-bold px-1.5 py-0.5 rounded text-white"
                                        style={{background:'rgba(139,92,246,0.85)'}}>IMPORTADA</div>
                                    )}
                                    <div className="absolute top-1.5 left-1.5 flex items-center gap-1 px-1.5 py-1 rounded-lg"
                                      style={{background:'rgba(0,0,0,0.75)'}}>
                                      <input type="checkbox" checked={isChk} onChange={()=>handleToggleCutCheckbox(frame.id)}
                                        className="w-3.5 h-3.5 rounded cursor-pointer accent-fuchsia-500"/>
                                    </div>
                                  </div>
                                  <div className="p-2 flex items-center justify-between" style={{background:'rgba(0,0,0,0.4)'}}>
                                    <div>
                                      <span className="block text-[10px] font-mono font-bold text-fuchsia-400">
                                        {frame.isImported?frame.fileName?.substring(0,14)||'Importada':formatTime(frame.time)}
                                      </span>
                                      {frame.shapes?.length>0&&<span className="text-[9px] text-amber-400 font-bold">🎨 {frame.shapes.length}</span>}
                                    </div>
                                    <div className="flex gap-1">
                                      <button onClick={()=>startEditFrameContext(frame)}
                                        className={`p-1.5 rounded-lg transition ${isEdit?'text-amber-300':'text-slate-500 hover:text-amber-400 hover:bg-white/5'}`}>
                                        <Icons.Edit className="w-3.5 h-3.5"/>
                                      </button>
                                      <a href={frame.dataUrl}
                                        download={`IS_Analisis_${activeProject.name.replace(/[^a-z0-9]/gi,'_')}_${idx+1}.jpg`}
                                        className="p-1.5 rounded-lg text-slate-500 hover:text-emerald-400 hover:bg-white/5 transition">
                                        <Icons.Download className="w-3.5 h-3.5"/>
                                      </a>
                                      <button onClick={()=>{
                                        setFrames(p=>p.filter(f=>f.id!==frame.id));
                                        setSelectedCutsForMerge(p=>p.filter(i=>i!==frame.id));
                                        if(editingContext.id===frame.id)setEditingContext({type:'global',id:null});
                                      }} className="p-1.5 rounded-lg text-slate-500 hover:text-red-400 hover:bg-white/5 transition">
                                        <Icons.Trash className="w-3.5 h-3.5"/>
                                      </button>
                                    </div>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    )}

                    {/* ══ TAB: AJUSTES ══ */}
                    {activeTab==='config'&&(
                      <div className="space-y-5 animate-fade-up">
                        <div className="rounded-2xl p-4 space-y-3"
                          style={{background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.06)'}}>
                          <h3 className="text-xs font-bold text-fuchsia-400 uppercase tracking-widest flex items-center gap-1.5">
                            <Icons.Plus className="w-3.5 h-3.5"/>Agregar Categoría
                          </h3>
                          <form onSubmit={handleAddCategory} className="space-y-3">
                            <input type="text" placeholder="Ej: Recuperación Alta"
                              value={newCatName} onChange={e=>setNewCatName(e.target.value)}
                              className="w-full rounded-xl px-3 py-2.5 text-xs text-white focus:outline-none transition"
                              style={{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)'}}/>
                            <div className="grid grid-cols-2 gap-2">
                              {[{label:'Antes (s)',v:newCatLead,f:e=>setNewCatLead(parseInt(e.target.value)||0)},
                                {label:'Después (s)',v:newCatLag,f:e=>setNewCatLag(parseInt(e.target.value)||0)}].map(({label,v,f})=>(
                                <div key={label}>
                                  <label className="block text-[9px] font-bold text-slate-600 uppercase tracking-wider mb-1.5">{label}</label>
                                  <input type="number" min="0" value={v} onChange={f}
                                    className="w-full rounded-lg px-2 py-2 text-xs text-white text-center font-mono font-bold focus:outline-none"
                                    style={{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)'}}/>
                                </div>
                              ))}
                            </div>
                            <div className="grid grid-cols-2 gap-2">
                              <div>
                                <label className="block text-[9px] font-bold text-slate-600 uppercase tracking-wider mb-1.5">Atajo de teclado</label>
                                <input type="text" maxLength="1" placeholder="Tecla"
                                  value={newCatShortcut} onChange={e=>setNewCatShortcut(e.target.value)}
                                  className="w-full rounded-lg px-2 py-2 text-xs text-white text-center font-mono font-bold uppercase focus:outline-none"
                                  style={{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)'}}/>
                              </div>
                              <div>
                                <label className="block text-[9px] font-bold text-slate-600 uppercase tracking-wider mb-1.5">Color del botón</label>
                                <ColorPicker value={newCatColor} onChange={setNewCatColor}/>
                              </div>
                            </div>
                            {newCatName&&(
                              <div className="rounded-xl p-3 text-center text-sm font-bold"
                                style={{backgroundColor:newCatColor,color:getContrastColor(newCatColor)}}>
                                {newCatName} — Preview
                              </div>
                            )}
                            <button type="submit" className="w-full btn-premium py-2.5 rounded-xl text-xs font-bold text-white">
                              Agregar a la Botonera
                            </button>
                          </form>
                        </div>

                        <div className="space-y-3">
                          <h3 className="text-[10px] font-bold text-slate-600 uppercase tracking-widest">Botonera activa</h3>
                          {categories.map(cat=>(
                            <div key={cat.id} className="rounded-xl overflow-hidden"
                              style={{border:'1px solid rgba(255,255,255,0.05)'}}>
                              <div className="h-1" style={{backgroundColor:cat.color}}/>
                              <div className="p-3 space-y-2.5" style={{background:'rgba(255,255,255,0.02)'}}>
                                <div className="flex items-center justify-between">
                                  <input type="text" value={cat.name}
                                    onChange={e=>handleCategoryChange(cat.id,'name',e.target.value)}
                                    className="font-bold text-xs text-white bg-transparent border-b border-transparent hover:border-white/15 focus:border-fuchsia-500 focus:outline-none w-48 py-0.5 transition"/>
                                  <button onClick={()=>deleteCategory(cat.id)}
                                    className="p-1.5 text-slate-600 hover:text-red-400 transition rounded-lg hover:bg-red-400/8">
                                    <Icons.Trash className="w-3.5 h-3.5"/>
                                  </button>
                                </div>
                                <div className="grid grid-cols-3 gap-2">
                                  {[{label:'Antes',f:'lead'},{label:'Después',f:'lag'},{label:'Atajo',f:'shortcut'}].map(({label,f})=>(
                                    <div key={f} className="rounded-lg p-2" style={{background:'rgba(255,255,255,0.03)'}}>
                                      <span className="block text-[8px] text-slate-600 uppercase font-bold mb-1 text-center">{label}</span>
                                      <input type={f==='shortcut'?'text':'number'} min="0" maxLength={f==='shortcut'?1:undefined}
                                        value={cat[f]} onChange={e=>handleCategoryChange(cat.id,f,e.target.value)}
                                        className="w-full text-xs font-bold text-white text-center font-mono bg-transparent focus:outline-none uppercase"/>
                                    </div>
                                  ))}
                                </div>
                                <div>
                                  <label className="block text-[9px] font-bold text-slate-600 uppercase tracking-wider mb-1.5">Color</label>
                                  <ColorPicker value={cat.color} onChange={c=>handleCategoryChange(cat.id,'color',c)}/>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                  </div>
                </>
              )}
            </div>
          </main>
        </div>
      );
    }

    const root=ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
